version: 2
project_name: bnh

builds:
  - id: bnh
    main: ./cmd/bnh
    binary: bnh
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ignore:
      - { goos: windows, goarch: arm64 }
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

archives:
  - id: tar
    formats: [tar.gz]
    format_overrides:
      - { goos: windows, formats: [zip] }
    name_template: '{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}'

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

# Sign checksums.txt with cosign keyless signing (Sigstore).
# The resulting .sig and .pem files are uploaded to the GitHub release.
# Verifiable by anyone via: cosign verify-blob --certificate checksums.txt.pem
#   --signature checksums.txt.sig --certificate-oidc-issuer https://token.actions.githubusercontent.com
#   --certificate-identity-regexp 'https://github.com/imbanytuidoter/base-node-helper/.github/workflows/release.yml@refs/tags/v'
#   checksums.txt
signs:
  - cmd: cosign
    args:
      - sign-blob
      - --yes
      - --output-signature=${signature}
      - --output-certificate=${certificate}
      - ${artifact}
    artifacts: checksum
    output: true

release:
  draft: false
  prerelease: auto
