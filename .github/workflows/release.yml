name: release
on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write   # required for keyless cosign signing via GitHub OIDC

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # [HIGH] supply-chain: pinned to immutable commit SHA, not mutable tag.
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with: { fetch-depth: 0 }

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with: { go-version: '1.23' }

      - uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8  # v7.2.1
        with:
          version: 'v2.15.4'   # [MED] exact pin — prevents surprise from new v2.x goreleaser releases
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
