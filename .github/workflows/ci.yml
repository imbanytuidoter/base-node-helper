name: ci
on:
  push:
    branches: [main]
  pull_request:

# [HIGH] supply-chain: minimal permissions — read-only by default.
# The test job needs no write access whatsoever.
permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ['1.23']
    steps:
      # [HIGH] supply-chain: pinned to immutable commit SHA, not mutable tag.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with: { go-version: '${{ matrix.go }}' }
      - run: go vet ./...
        shell: bash
      - run: go test -race -coverprofile=coverage.txt ./...
        shell: bash
      - name: Coverage gate
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          pct=$(go tool cover -func=coverage.txt | grep total | awk '{print $3}' | tr -d '%')
          echo "coverage=$pct"
          awk -v p="$pct" 'BEGIN { exit (p+0 < 60) ? 1 : 0 }'
