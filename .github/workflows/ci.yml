name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ['1.23']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '${{ matrix.go }}' }
      - run: go vet ./...
        shell: bash
      - run: go test -race -coverprofile=coverage.txt ./...
        shell: bash
      - name: Coverage gate
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          pct=$(go tool cover -func=coverage.txt | grep total | awk '{print $3}' | tr -d '%')
          echo "coverage=$pct"
          awk -v p="$pct" 'BEGIN { exit (p+0 < 60) ? 1 : 0 }'
